<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
</head>
<body>

<div style="border:1px solid black; width:400px; padding:20px;">

    <h2>Add Employee Form</h2>

    <form action="/save" method="post">
        Name: <input type="text" name="name" placeholder="Enter Name"><br><br>

        Email: <input type="text" name="email" placeholder="Enter Email"><br><br>

        Department: <input type="text" name="department" placeholder="Enter Department"><br><br>

        Salary: <input type="number" name="salary" placeholder="Enter Salary"><br><br>

        <button type="submit">Save Employee</button>
    </form>

    <br>
    <a href="/">Back to Home</a>

</div>

</body>
</html>
